# Local / generic compose — works with `docker compose` and `podman-compose`.
# Builds the canonical Containerfile (exact deps from requirements.lock.txt).
#   1. cp .env.example .env   (then add at least one LLM key, e.g. GEMINI_API_KEY)
#   2. docker compose up -d   (or: podman-compose up -d)
#   3. open http://127.0.0.1:8077  — the first account you create becomes admin.
#
# Production note: the maintainer runs this rootless under Podman on a host
# called "flame" with data/ and .env bind-mounted — this compose is the
# portable equivalent for everyone else.
services:
  web:
    build:
      context: .
      dockerfile: Containerfile
    image: podcast-du-jour
    ports:
      - "127.0.0.1:8077:8077"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: fires due schedules every hour (replaces the host cron entry).
  scheduler:
    image: podcast-du-jour
    build:
      context: .
      dockerfile: Containerfile
    command: ["python", "scheduler.py", "loop", "3600"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - web
    restart: unless-stopped
