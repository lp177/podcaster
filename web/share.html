<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Podcast partagé · Podcaster</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0e0e13" />
</head>
<body>
  <main style="max-width:620px">
    <div class="brand" style="justify-content:center;margin:36px 0 26px">
      <span class="logo">
        <svg class="ic" viewBox="0 0 24 24" style="stroke:#fff"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0012 0M12 17v3M9 20h6"/></svg>
      </span>
      <div>Podcaster<small>partagé avec vous</small></div>
    </div>
    <div id="share" class="card"><div class="empty">Chargement…</div></div>
    <p class="view-sub" style="text-align:center;margin-top:22px">Lien privé — gardez-le pour vous.</p>
  </main>
  <script>
    const key = location.pathname.split("/").filter(Boolean).pop()
    const box = document.getElementById("share")
    const esc = (s) => String(s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]))
    fetch("/api/shared/" + encodeURIComponent(key))
      .then((r) => { if (!r.ok) throw new Error(); return r.json() })
      .then((e) => {
        box.style.setProperty("--card-accent", "#7c5cff")
        box.innerHTML = `
          <div class="head">
            <span class="icon">${esc(e.icon) || "🎧"}</span>
            <div class="grow">
              <div class="title">${esc(e.title)}</div>
              <div class="summary">${esc(e.date)} · ${esc(e.language_label || "")}</div>
            </div>
          </div>
          <div class="ep-summary">${esc(e.summary)}</div>
          <audio controls preload="none" src="${esc(e.audio_url)}"></audio>
          <div class="actions">
            <a class="btn tonal" href="${esc(e.audio_url)}" download="podcast.mp3">⬇ Télécharger</a>
          </div>`
      })
      .catch(() => { box.innerHTML = '<div class="empty">Lien invalide ou expiré.</div>' })
  </script>
</body>
</html>
